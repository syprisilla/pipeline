<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>대시보드</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="auth-box dashboard-box">
      <h1>문서 검색 서비스</h1>
      <p class="welcome">{{ username }}님 환영합니다.</p>

      <section class="panel">
        <h2>문서 등록</h2>
        <form action="/documents" method="post">
          <input type="hidden" name="username" value="{{ username }}" />

          <label for="title">제목</label>
          <input id="title" name="title" type="text" required />

          <label for="content">내용</label>
          <textarea id="content" name="content" rows="6" required></textarea>

          <button type="submit">문서 저장</button>
        </form>
      </section>

      <section class="panel">
        <h2>문서 검색</h2>
        <form action="/documents/search" method="get">
          <input type="hidden" name="username" value="{{ username }}" />

          <input
            name="keyword"
            type="text"
            placeholder="검색어를 입력하세요"
            value="{{ keyword }}"
          />

          <button type="submit">검색</button>
        </form>
      </section>

      <section class="panel">
        <h2>문서 목록</h2>

        {% if documents %}
          <div class="document-list">
            {% for document in documents %}
              <article class="document-item">
                <h3>{{ document.title }}</h3>
                <p>{{ document.content }}</p>
                <small>{{ document.created_at }}</small>
              </article>
            {% endfor %}
          </div>
        {% else %}
          <p class="empty-text">등록된 문서가 없습니다.</p>
        {% endif %}
      </section>

      <a class="button-link" href="/login">로그인 화면으로 돌아가기</a>
    </main>
  </body>
</html>
