{% extends "dashboard_base.html" %}

{% block content %}
<header class="dashboard-header">
  <div>
    <p class="eyebrow">RAG Document Search</p>
    <h1>문서 검색 서비스</h1>
    <p class="welcome">{{ username }}님, 원하는 작업을 선택하세요.</p>
  </div>
  <a class="ghost-link" href="/login">로그아웃</a>
</header>

<section class="menu-grid" aria-label="문서 검색 서비스 메뉴">
  <a class="menu-card" href="/documents/new?username={{ username }}">
    <span class="menu-icon">+</span>
    <strong>문서 등록</strong>
    <small>새 문서 제목과 내용을 저장합니다.</small>
  </a>

  <a class="menu-card" href="/documents/search-page?username={{ username }}">
    <span class="menu-icon">⌕</span>
    <strong>문서 검색</strong>
    <small>저장된 문서에서 키워드를 찾습니다.</small>
  </a>

  <a class="menu-card" href="/rag?username={{ username }}">
    <span class="menu-icon">?</span>
    <strong>RAG 질문</strong>
    <small>문서를 바탕으로 질문에 답합니다.</small>
  </a>

  <a class="menu-card" href="/documents/list?username={{ username }}">
    <span class="menu-icon">≡</span>
    <strong>문서 목록</strong>
    <small>저장된 모든 문서를 확인합니다.</small>
  </a>

  <a class="menu-card" href="/categories?username={{ username }}">
    <span class="menu-icon">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="28"
        height="28"
        fill="currentColor"
        viewBox="0 0 16 16"
      >
        <path
          d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31zM2.19 4a1 1 0 0 0-.996 1.09l.637 7a1 1 0 0 0 .995.91h10.348a1 1 0 0 0 .995-.91l.637-7A1 1 0 0 0 13.81 4zm4.69-1.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981l.006.139q.323-.119.684-.12h5.396z"
        />
      </svg>
    </span>
    <strong>카테고리 관리</strong>
    <small>카테고리를 만들고 문서를 분류합니다.</small>
  </a>
</section>
{% endblock %}
